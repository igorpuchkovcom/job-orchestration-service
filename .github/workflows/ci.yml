name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/job_orchestration_service
      REDIS_URL: redis://127.0.0.1:6379/0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_orchestration_service
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U postgres -d job_orchestration_service"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lint
        run: python -m ruff check .

      - name: Run unit tests
        run: python -m pytest tests/unit

      - name: Run integration tests
        run: python -m pytest tests/integration

      - name: Build Docker image
        run: docker build -t job-orchestration-service-ci .
